<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music">
    <link rel="manifest" href="manifest.json">
    <title>Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0b;
            --bg-card: #141416;
            --bg-active: #1f1f23;
            --bg-elevated: #1a1a1e;
            --accent: #8B5CF6;
            --accent-dim: rgba(139, 92, 246, 0.15);
            --text: #fafafa;
            --text-dim: #9ca3af;
            --text-muted: #6b7280;
            --border: #27272a;
            --success: #22c55e;
            --danger: #ef4444;
        }

        html,
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            overscroll-behavior: contain;
        }

        body.fs-open {
            overflow: hidden;
        }

        /* ========== COMPACT NOW-PLAYING BAR ========== */
        .now-playing-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding-top: max(0.5rem, env(safe-area-inset-top));
        }

        .now-playing-bar.playing {
            border-bottom-color: var(--accent);
        }

        .now-playing-bar-content {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            height: 56px;
        }

        .now-playing-bar-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .now-playing-bar-track {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-bar.playing .now-playing-bar-track {
            color: var(--accent);
        }

        .now-playing-bar-controls {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            flex-shrink: 0;
        }

        .bar-control-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.1s ease;
        }

        .bar-control-btn:active {
            transform: scale(0.9);
            background: var(--bg-active);
        }

        .bar-control-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .bar-play-btn {
            background: var(--accent);
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }

        .bar-play-btn:active {
            background: #7C3AED;
        }

        .bar-play-btn svg {
            width: 20px;
            height: 20px;
        }

        .bar-expand-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .bar-expand-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ========== THIN PROGRESS BAR (compact bar) ========== */
        .now-playing-bar-progress {
            height: 20px;
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            touch-action: none;
            padding: 0 1rem;
        }

        .bar-progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .bar-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 100%;
            transform: scaleX(0);
            transform-origin: left center;
            will-change: transform;
            transition: transform 0.3s linear;
        }

        body.seeking .bar-progress-fill,
        body.seeking .mini-progress-fill {
            transition: none;
        }

        .now-playing-bar-progress:active .bar-progress-track {
            height: 8px;
            transition: height 0.1s ease;
        }

        /* ========== EQUALIZER BARS ========== */
        .equalizer {
            display: none;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            flex-shrink: 0;
        }

        .playing .equalizer {
            display: flex;
        }

        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 1px;
            height: 40%;
            transform-origin: bottom center;
        }

        .playing .eq-bar {
            animation: eq 0.5s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(1) { animation-delay: 0s; }
        .eq-bar:nth-child(2) { animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { animation-delay: 0.15s; }

        @keyframes eq {
            from { transform: scaleY(0.3); }
            to { transform: scaleY(1.5); }
        }

        /* ========== FULLSCREEN PLAYER ========== */
        .fullscreen-player {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 300;
            display: flex;
            flex-direction: column;
            padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem max(2rem, env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            will-change: transform;
        }

        .fullscreen-player.open {
            transform: translateY(0);
        }

        .fullscreen-player.dimming {
            transition: none;
        }

        .fullscreen-player.spring-back {
            transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .fs-drag-handle {
            width: 40px;
            height: 5px;
            background: var(--text-dim);
            border-radius: 3px;
            margin: 0 auto 1.5rem;
            opacity: 0.7;
        }

        .fs-close-btn {
            position: absolute;
            top: max(1rem, env(safe-area-inset-top));
            right: 1rem;
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
        }

        .fs-close-btn:active {
            background: var(--bg-active);
        }

        .fs-close-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .fs-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 1.5rem;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-height: 700px) {
            .fs-content {
                gap: 2.5rem;
            }
        }

        .fs-track-info {
            text-align: center;
            padding: 0 1rem;
        }

        .fs-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .fs-track-name {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .fs-progress {
            width: 100%;
        }

        .fs-progress-bar {
            height: 32px;
            display: flex;
            align-items: center;
            cursor: pointer;
            touch-action: none;
        }

        .fs-progress-track {
            width: 100%;
            height: 4px;
            background: var(--bg-active);
            border-radius: 2px;
            overflow: visible;
            position: relative;
        }

        .fs-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            position: relative;
            transition: width 0.3s linear;
        }

        .fullscreen-player.seeking .fs-progress-fill {
            transition: none;
        }

        .fs-progress-fill::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .fs-progress-bar:active .fs-progress-fill::after,
        .fullscreen-player.seeking .fs-progress-fill::after {
            opacity: 1;
        }

        .fs-times {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
        }

        .fs-time {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        .fs-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
        }

        .fs-control-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .fs-control-btn:active {
            transform: scale(0.9);
            background: var(--bg-active);
        }

        .fs-control-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .fs-play-btn {
            width: 64px;
            height: 64px;
            background: var(--accent);
        }

        .fs-play-btn:active {
            background: #7C3AED;
        }

        .fs-play-btn svg {
            width: 32px;
            height: 32px;
        }

        .fs-control-btn.shuffle-active {
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ========== QUEUE IN FULLSCREEN OVERLAY ========== */
        .fs-queue {
            flex-shrink: 1;
            max-height: 45vh;
            overflow-y: auto;
            overscroll-behavior: contain;
            margin-top: 1rem;
            padding: 0;
        }

        .fs-queue .queue-section {
            margin: 0;
            background: transparent;
            border: none;
            border-radius: 0;
        }

        .fs-queue .queue-header {
            padding: 0.4rem 0;
            min-height: 32px;
            border-bottom: 1px solid var(--border);
        }

        .fs-queue .queue-list {
            max-height: 38vh;
        }

        .fs-queue .queue-item {
            padding: 0.35rem 0.25rem;
            min-height: 40px;
        }

        .fs-queue .queue-item-title {
            font-size: 0.75rem;
        }

        .fs-queue .queue-drag-handle {
            width: 28px;
        }

        .fs-queue .queue-remove {
            width: 36px;
            height: 36px;
        }

        .fs-queue .queue-badge {
            font-size: 0.65rem;
        }

        /* ========== TRACK BROWSER ========== */
        .fs-track-browser {
            flex-shrink: 1;
            max-height: 30vh;
            overflow: auto;
            display: flex;
            flex-direction: column;
        }

        .track-browser-section {
            margin: 0;
            background: transparent;
            border: none;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .track-browser-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.35rem 0;
            min-height: 28px;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border);
        }

        .track-browser-count {
            font-weight: 400;
            color: var(--text-dim);
        }

        .track-browser-list {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .track-browser-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.25rem;
            min-height: 38px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid var(--border);
        }

        .track-browser-item:last-child {
            border-bottom: none;
        }

        .track-browser-item:active {
            background: var(--bg-active);
        }

        .track-browser-item.in-queue {
            opacity: 0.6;
        }

        .track-browser-item.in-queue .browser-add-icon {
            color: var(--accent);
        }

        .browser-track-num {
            font-size: 0.65rem;
            color: var(--text-muted);
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .browser-track-info {
            flex: 1;
            min-width: 0;
        }

        .browser-track-title {
            font-size: 0.72rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .browser-track-duration {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .browser-add-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .browser-add-icon svg {
            width: 16px;
            height: 16px;
        }

        /* ========== QUEUE SECTION ========== */
        .queue-section {
            margin: 0.75rem 1rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: opacity 0.2s;
        }

        .queue-section.hidden {
            display: none;
        }

        .queue-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            min-height: 44px;
        }

        .queue-header:active {
            background: var(--bg-active);
        }

        .queue-title {
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .queue-badge {
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        .queue-chevron {
            width: 20px;
            height: 20px;
            fill: var(--text-dim);
            transition: transform 0.2s ease;
        }

        .queue-section.collapsed .queue-chevron {
            transform: rotate(-90deg);
        }

        .queue-section.collapsed .queue-list {
            display: none;
        }

        .queue-section.collapsed .queue-header {
            border-bottom: none;
        }

        .queue-list {
            max-height: 260px;
            overflow-y: auto;
            overscroll-behavior: contain;
            position: relative;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.5rem 0.5rem 0.25rem;
            border-bottom: 1px solid var(--border);
            min-height: 48px;
            background: var(--bg-card);
            position: relative;
            z-index: 1;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), background 0.15s, box-shadow 0.2s;
        }

        .queue-item:last-child {
            border-bottom: none;
        }

        .queue-item.dragging {
            background: var(--bg-elevated);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 10;
            border-radius: 8px;
            border-bottom-color: transparent;
            transform: scale(1.02);
            transition: box-shadow 0.2s, background 0.15s;
        }

        .queue-item.drag-shift-down {
            transform: translateY(48px);
        }

        .queue-item.drag-shift-up {
            transform: translateY(-48px);
        }

        .queue-drag-handle {
            width: 32px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: grab;
            touch-action: none;
            color: var(--text-muted);
        }

        .queue-drag-handle:active {
            cursor: grabbing;
            color: var(--text-dim);
        }

        .queue-drag-handle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .queue-item-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.1rem 0;
        }

        .queue-item-num {
            font-size: 0.7rem;
            color: var(--text-muted);
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .queue-item-title {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-remove {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
            transition: color 0.15s;
        }

        .queue-remove:active {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* ========== TRACK LIST ========== */
        .track-list-section {
            padding: 0.5rem 1rem 2rem;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
        }

        .track-list {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .track-item-wrapper {
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            touch-action: pan-y;
        }

        .track-item-wrapper:last-child {
            border-bottom: none;
        }

        .track-item-action {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            gap: 0.3rem;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .track-item-wrapper.swiping .track-item-action {
            opacity: 1;
        }

        .track-item-action svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .track-item-action.queue-action {
            left: 0;
            background: var(--accent);
        }

        .track-item-action.remove-action {
            right: 0;
            background: var(--danger);
        }

        .track-item-wrapper.threshold-reached .track-item-action {
            opacity: 1;
            font-size: 0.75rem;
        }

        .track-item-wrapper.threshold-reached .queue-action {
            background: #7C3AED;
        }

        .track-item-wrapper.threshold-reached .remove-action {
            background: #dc2626;
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.15s ease;
            position: relative;
            background: var(--bg-card);
            min-height: 52px;
        }

        .track-item:active {
            background: var(--accent-dim);
            transition: background 0s;
        }

        .track-item.playing {
            background: #1a1528;
        }

        .track-item.in-queue {
            background: #141a16;
        }

        .track-number {
            width: 24px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            flex-shrink: 0;
            position: relative;
        }

        .track-item.loading .track-number span {
            visibility: hidden;
        }

        .track-item.loading .track-number::after {
            content: '';
            position: absolute;
            inset: 0;
            margin: auto;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .track-item.playing .track-number span {
            display: none;
        }

        .track-item.playing .playing-icon {
            display: flex;
        }

        .playing-icon {
            display: none;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
        }

        .playing-icon .eq-bar {
            width: 3px;
            animation: eq 0.4s ease-in-out infinite alternate;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item.playing .track-title {
            color: var(--accent);
        }

        .track-duration {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        .add-to-queue {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
            transition: color 0.15s ease;
        }

        .add-to-queue:active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .add-to-queue.added {
            color: var(--success);
        }

        .add-to-queue svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ========== MINI PLAYER ========== */
        .mini-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 0.75rem 1rem;
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .mini-player.visible {
            transform: translateY(0);
        }

        .mini-play-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .mini-play-btn:active {
            background: #7C3AED;
        }

        .mini-play-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .mini-info {
            flex: 1;
            min-width: 0;
        }

        .mini-track-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .mini-progress {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .mini-progress-fill {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transform: scaleX(0);
            transform-origin: left center;
            will-change: transform;
            transition: transform 0.3s linear;
        }

        .mini-expand {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-expand svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ========== SWIPE TOAST ========== */
        .swipe-toast {
            position: fixed;
            bottom: calc(120px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated);
            color: var(--text);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid var(--border);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 400;
            pointer-events: none;
            white-space: nowrap;
        }

        .swipe-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========== LOADING ========== */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            color: var(--text-dim);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden-player {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .bottom-spacer {
            height: 1rem;
        }

        body:has(.mini-player.visible) .bottom-spacer {
            height: calc(80px + env(safe-area-inset-bottom, 0px));
        }
