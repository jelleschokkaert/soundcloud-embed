                <div class="track-item-action remove-action"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>Remove</div>
                <div class="track-item ${isCurrent ? 'playing' : ''} ${isInQueue ? 'in-queue' : ''}" data-index="${i}">
                    <div class="track-number">
                        <span>${i + 1}</span>
                        <div class="playing-icon">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>
                    </div>
                    <div class="track-info">
                        <div class="track-title">${title}</div>
                        <div class="track-duration">${dur > 0 ? formatTime(dur) : ''}</div>
                    </div>
                    <button class="add-to-queue ${isInQueue ? 'added' : ''}" data-index="${i}" aria-label="Add to queue">
                        <svg viewBox="0 0 24 24">${isInQueue ? '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>' : '<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>'}</svg>
                    </button>
                </div>
            </div>`;
        }

        let _renderTracksRAF = 0;
        function scheduleRenderTracks() {
            if (_renderTracksRAF) return;
            _renderTracksRAF = requestAnimationFrame(() => { _renderTracksRAF = 0; renderTracks(); });
        }

        function renderTracks() {
            const count = trackCount || tracks.length;
            if (count === 0) {
                trackListEl.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading tracks...</span></div>';
                trackListInitialized = false;
                return;
            }
            const qs = getQueueSet();
            if (!trackListInitialized) {
                let html = '';
                for (let i = 0; i < count; i++) html += buildTrackItemHTML(i, qs);
                trackListEl.innerHTML = html;
                trackListInitialized = true;
                return;
            }
            const wrappers = trackListEl.children;
            for (let i = 0; i < wrappers.length; i++) {
                const wrapper = wrappers[i];
                const item = wrapper.querySelector('.track-item');
                if (!item) continue;
                const idx = parseInt(item.dataset.index);
                const isCurrent = idx === currentIndex;
                const isInQueue = qs.has(idx);
                item.classList.toggle('playing', isCurrent);
                item.classList.toggle('in-queue', isInQueue);
                const btn = item.querySelector('.add-to-queue');
                if (btn) {
                    btn.classList.toggle('added', isInQueue);
                    btn.querySelector('svg').innerHTML = isInQueue
                        ? '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>'
                        : '<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>';
                }
                if (trackInfoDirty) {
                    const titleEl = item.querySelector('.track-title');
                    if (titleEl) titleEl.textContent = getTrackTitle(idx);
                    const durEl = item.querySelector('.track-duration');
                    const dur = getTrackDuration(idx);
                    if (durEl) durEl.textContent = dur > 0 ? formatTime(dur) : '';
                }
            }
            trackInfoDirty = false;
        }

        // ========== EVENT DELEGATION ==========
        trackListEl.addEventListener('click', (e) => {
            if (swipeOccurred) { swipeOccurred = false; return; }
            const queueBtn = e.target.closest('.add-to-queue');
            if (queueBtn) {
                e.stopPropagation();
                toggleQueue(parseInt(queueBtn.dataset.index));
                return;
            }
            const item = e.target.closest('.track-item');
            if (item) { ensureSilentAudioOnGesture(); playTrack(parseInt(item.dataset.index), true); }
        });

        // ========== SWIPE GESTURES ==========
        let swipeStartX = 0, swipeStartY = 0, swipeWrapper = null, swipeItem = null, swipeDirection = null;
        const SWIPE_THRESHOLD = 60;

        trackListEl.addEventListener('touchstart', (e) => {
            swipeOccurred = false;
            swipeWrapper = e.target.closest('.track-item-wrapper');
            if (!swipeWrapper) return;
            swipeItem = swipeWrapper.querySelector('.track-item');
            swipeStartX = e.touches[0].clientX;
            swipeStartY = e.touches[0].clientY;
            swipeDirection = null;
        }, { passive: true });

        trackListEl.addEventListener('touchmove', (e) => {
            if (!swipeItem) return;
            const dx = e.touches[0].clientX - swipeStartX;
            const dy = e.touches[0].clientY - swipeStartY;

            // Decide direction once
            if (!swipeDirection) {
                if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return; // dead zone
                swipeDirection = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
            }

            // Vertical = let browser handle scroll, bail out
            if (swipeDirection === 'v') { swipeItem = null; swipeWrapper = null; return; }

            // Prevent scroll during horizontal swipe
            e.preventDefault();

            // Horizontal swipe
            swipeWrapper.classList.add('swiping');
            const wasBelow = !swipeWrapper.classList.contains('threshold-reached');
            const isAbove = Math.abs(dx) >= SWIPE_THRESHOLD;
            swipeWrapper.classList.toggle('threshold-reached', isAbove);
            if (wasBelow && isAbove && 'vibrate' in navigator) navigator.vibrate(8);
            const clamped = Math.max(-80, Math.min(80, dx));
            swipeItem.style.transform = `translateX(${clamped}px)`;
            swipeItem.style.transition = 'none';
        }, { passive: false });

        trackListEl.addEventListener('touchend', (e) => {
            if (!swipeItem || swipeDirection !== 'h') {
                swipeItem = null; swipeWrapper = null; swipeDirection = null;
                return;
            }
            const dx = e.changedTouches[0].clientX - swipeStartX;
            const idx = parseInt(swipeItem.dataset.index);

            swipeItem.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1)';
            swipeItem.style.transform = '';
            if (swipeWrapper) swipeWrapper.classList.remove('swiping', 'threshold-reached');

            if (Math.abs(dx) > 10) {
                swipeOccurred = true;
                setTimeout(() => { swipeOccurred = false; }, 300);
            }

            if (dx > SWIPE_THRESHOLD) {
                if (!queue.includes(idx)) {
                    queue.push(idx);
                    renderQueue(); renderTracks();
                    showToast('Added to queue');
                } else {
                    showToast('Already in queue');
                }
            } else if (dx < -SWIPE_THRESHOLD) {
                const pos = queue.indexOf(idx);
                if (pos > -1) {
                    queue.splice(pos, 1);
                    renderQueue(); renderTracks();
                    showToast('Removed from queue');
                } else {
                    showToast('Not in queue');
                }
            }
            swipeItem = null; swipeWrapper = null; swipeDirection = null;
        }, { passive: true });

        trackListEl.addEventListener('touchcancel', () => {
            if (swipeItem) {
                swipeItem.style.transition = 'transform 0.2s ease';
                swipeItem.style.transform = '';
            }
            if (swipeWrapper) swipeWrapper.classList.remove('swiping', 'threshold-reached');
            swipeItem = null; swipeWrapper = null; swipeDirection = null;
        }, { passive: true });

        // ========== QUEUE ==========
        function renderQueue() {
            queueBadge.textContent = queue.length;
            fsQueueBadge.textContent = queue.length;

            // Build HTML once
            const queueHtml = queue.map((trackIndex, i) => `
                <div class="queue-item" data-index="${trackIndex}" data-queue-pos="${i}">
                    <div class="queue-drag-handle" data-queue-pos="${i}">
                        <svg viewBox="0 0 24 24"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    </div>
                    <div class="queue-item-info">
                        <span class="queue-item-num">${i + 1}</span>
                        <span class="queue-item-title">${escapeHTML(getTrackTitle(trackIndex))}</span>
                    </div>
                    <button class="queue-remove" data-queue-pos="${i}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>`).join('');

            // Hide entire section when empty
            if (queue.length === 0) {
                queueSection.classList.add('hidden');
                fsQueueSection.classList.add('hidden');
                queueList.innerHTML = '';
                fsQueueList.innerHTML = '';
                return;
            }

            // Show when items are added; only auto-expand on first item
            const wasHidden = queueSection.classList.contains('hidden');
            queueSection.classList.remove('hidden');
            fsQueueSection.classList.remove('hidden');
            if (wasHidden) {
                queueSection.classList.remove('collapsed');
                fsQueueSection.classList.remove('collapsed');
                queueCollapsed = false;
            }

            // Update both list containers with same content
            queueList.innerHTML = queueHtml;
            fsQueueList.innerHTML = queueHtml;
            updateTrackBrowserQueueState();
        }

        // Queue event delegation (tap to play, X to remove)
        function handleQueueClick(e) {
            if (e.target.closest('.queue-drag-handle')) return;
            const removeBtn = e.target.closest('.queue-remove');
            if (removeBtn) {
                e.stopPropagation();
                queue.splice(parseInt(removeBtn.dataset.queuePos), 1);
                renderQueue(); renderTracks();
                return;
            }
            const item = e.target.closest('.queue-item');
            if (item) {
                const trackIdx = parseInt(item.dataset.index);
                const queuePos = parseInt(item.dataset.queuePos);
                queue.splice(queuePos, 1);
                renderQueue(); renderTracks();
                playTrack(trackIdx, true);
            }
        }
        queueList.addEventListener('click', handleQueueClick);
        fsQueueList.addEventListener('click', handleQueueClick);

        // fsTrackBrowserList click handler (add to queue)
        fsTrackBrowserList.addEventListener('click', (e) => {
            const item = e.target.closest('.track-browser-item');
            if (!item) return;
            
            const index = parseInt(item.dataset.index);
            if (queue.includes(index)) {
                showToast('Already in queue');
                return;
            }
            queue.push(index);
            showToast('Added to queue');
            renderQueue();
            if ('vibrate' in navigator) navigator.vibrate(10);
        });

        // ========== QUEUE DRAG-TO-REORDER ==========
        function initDragReorder(container) {
            let dragItem = null, dragStartY = 0, dragIndex = -1, dragActive = false;
            let dragItemRects = [];

            function cleanup() {
                if (!dragItem) return;
                Array.from(container.querySelectorAll('.queue-item')).forEach(el => {
                    el.classList.remove('dragging', 'drag-shift-down', 'drag-shift-up');
                    el.style.transform = '';
                });
                container.style.userSelect = '';
                dragItem = null;
                dragIndex = -1;
                dragActive = false;
            }

            container.addEventListener('touchstart', (e) => {
                const handle = e.target.closest('.queue-drag-handle');
                if (!handle) return;
                const item = handle.closest('.queue-item');
                if (!item) return;
                dragIndex = parseInt(item.dataset.queuePos);
                dragItem = item;
                dragStartY = e.touches[0].clientY;
                dragActive = false;
                dragItemRects = Array.from(container.querySelectorAll('.queue-item')).map(el => {
                    const r = el.getBoundingClientRect();
                    return { el, top: r.top, mid: r.top + r.height / 2, pos: parseInt(el.dataset.queuePos) };
                });
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (!dragItem) return;
                const y = e.touches[0].clientY;
                const dy = y - dragStartY;
                if (!dragActive) {
                    if (Math.abs(dy) < 6) return;
                    dragActive = true;
                    dragItem.classList.add('dragging');
                    if ('vibrate' in navigator) navigator.vibrate(12);
                    container.style.userSelect = 'none';
                }
                dragItem.style.transform = `translateY(${dy}px) scale(1.02)`;
                dragItemRects.forEach(r => {
                    if (r.pos === dragIndex) return;
                    r.el.classList.remove('drag-shift-down', 'drag-shift-up');
                    if (dy > 0 && r.pos > dragIndex && y > r.mid) r.el.classList.add('drag-shift-up');
                    if (dy < 0 && r.pos < dragIndex && y < r.mid) r.el.classList.add('drag-shift-down');
                });
            }, { passive: true });

            container.addEventListener('touchend', () => {
                if (!dragItem || !dragActive) { cleanup(); return; }
                let targetIndex = dragIndex;
                const shifted = dragItemRects.filter(r =>
                    r.el.classList.contains('drag-shift-up') || r.el.classList.contains('drag-shift-down')
                );
                if (shifted.length > 0) {
                    targetIndex = shifted[0].el.classList.contains('drag-shift-up')
                        ? Math.max(...shifted.map(r => r.pos))
                        : Math.min(...shifted.map(r => r.pos));
                }
                if (targetIndex !== dragIndex && targetIndex >= 0 && targetIndex < queue.length) {
                    const [moved] = queue.splice(dragIndex, 1);
                    queue.splice(targetIndex, 0, moved);
                    if ('vibrate' in navigator) navigator.vibrate(8);
                }
                cleanup();
                renderQueue();
            }, { passive: true });

            container.addEventListener('touchcancel', () => { cleanup(); });
        }

        initDragReorder(queueList);
        initDragReorder(fsQueueList);

        function toggleQueue(index) {
            const pos = queue.indexOf(index);
            if (pos > -1) { queue.splice(pos, 1); showToast('Removed from queue'); }
            else { queue.push(index); showToast('Added to queue'); }
            renderQueue(); renderTracks();
        }

        function toggleQueueCollapse() {
            queueCollapsed = !queueCollapsed;
            queueSection.classList.toggle('collapsed', queueCollapsed);
            fsQueueSection.classList.toggle('collapsed', queueCollapsed);
        }
        queueHeader.addEventListener('click', toggleQueueCollapse);
        fsQueueHeader.addEventListener('click', toggleQueueCollapse);

        // ========== SHUFFLE & ORDER ==========
        function generatePlayOrder() {
            // Maak een lijst van 0 tot (trackCount - 1)
            playOrder = Array.from({length: trackCount}, (_, i) => i);
            
            if (isShuffled) {
                // Fisher-Yates shuffle
                for (let i = playOrder.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [playOrder[i], playOrder[j]] = [playOrder[j], playOrder[i]];
                }
            }
            // Zorg dat de speler weet waar we nu zijn in de nieuwe volgorde
            playOrderIndex = playOrder.indexOf(currentIndex);
            if (playOrderIndex === -1) playOrderIndex = 0;
        }

        // Centrale functie om het volgende nummer in de volgorde te spelen
        function playNextInOrder() {
            if (currentIndex === -1) { if (playOrder.length > 0) playTrack(playOrder[0], true); return; }
            if (queue.length > 0) {
                const n = queue.shift();
                renderQueue();
                scheduleRenderTracks();
                playTrack(n, true);
            } else {
                const nextIndex = playOrderIndex + 1;
                const actualIndex = nextIndex >= playOrder.length ? 0 : nextIndex;
                playTrack(playOrder[actualIndex], true);
            }
        }

        function playPrevInOrder() {
            if (currentIndex === -1) { if (playOrder.length > 0) playTrack(playOrder[0], true); return; }
            const prevIndex = playOrderIndex - 1;
            const actualIndex = prevIndex < 0 ? playOrder.length - 1 : prevIndex;
            playTrack(playOrder[actualIndex], true);
        }

        function renderTrackBrowser() {
            if (!fsTrackBrowserList) return;
            
            trackBrowserCount.textContent = trackCount + ' tracks';
            
            // Use cached shuffle order; only regenerate when needed
            if (!browserShuffledIndices || browserShuffledIndices.length !== trackCount) {
                browserShuffledIndices = Array.from({ length: trackCount }, (_, i) => i);
                for (let k = browserShuffledIndices.length - 1; k > 0; k--) {
                    const j = Math.floor(Math.random() * (k + 1));
                    [browserShuffledIndices[k], browserShuffledIndices[j]] = [browserShuffledIndices[j], browserShuffledIndices[k]];
                }
            }
            const indices = browserShuffledIndices;
            
            const qs = getQueueSet();
            fsTrackBrowserList.innerHTML = indices.map((originalIndex, displayIndex) => {
                const isInQueue = qs.has(originalIndex);
                const title = escapeHTML(getTrackTitle(originalIndex));
                const dur = getTrackDuration(originalIndex);
                return `
                    <div class="track-browser-item ${isInQueue ? 'in-queue' : ''}" data-index="${originalIndex}">
                        <span class="browser-track-num">${displayIndex + 1}</span>
                        <div class="browser-track-info">
                            <div class="browser-track-title">${title}</div>
                            ${dur ? `<div class="browser-track-duration">${formatTime(dur)}</div>` : ''}
                        </div>
                        <div class="browser-add-icon">
                            ${isInQueue
                                ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
                                : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'
                            }
                        </div>
                    </div>`;
            }).join('');
        }

        function updateTrackBrowserQueueState() {
            if (!fsTrackBrowserList) return;
            const qs = getQueueSet();
            const items = fsTrackBrowserList.querySelectorAll('.track-browser-item');
            items.forEach(item => {
                const idx = parseInt(item.dataset.index);
                const isInQueue = qs.has(idx);
                item.classList.toggle('in-queue', isInQueue);
                const icon = item.querySelector('.browser-add-icon');
                if (icon) {
                    icon.innerHTML = isInQueue
                        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
                        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>';
                }
            });
        }

        // ========== PLAYBACK ==========
        // Tapping a track always plays it — never toggles to pause. Pause is reserved for the play button.
        function playTrack(index) {
            _userIntentPlay = true;
            if (_scheduledAdvance) { clearTimeout(_scheduledAdvance); _scheduledAdvance = null; }
            if (index === currentIndex) { widget.play(); return; }
            // Loading feedback
            trackListEl.querySelectorAll('.track-item.loading').forEach(el => el.classList.remove('loading'));
            const targetItem = trackListEl.querySelector(`.track-item[data-index="${index}"]`);
            if (targetItem) targetItem.classList.add('loading');
            // Update state immediately to prevent polling from detecting
            // the widget's intermediate auto-advance state
            currentIndex = index;
            playOrderIndex = playOrder.indexOf(index);
            _skipPending = true;
            _lastAdvanceTime = Date.now();
            const title = getTrackTitle(index);
            currentTrackNameEl.textContent = title;
            miniTrackName.textContent = title;
            duration = getTrackDuration(index);
            if (fsOpen) fsTrackName.textContent = title;
            scheduleRenderTracks();
            widget.skip(index);
            widget.play();
            // iOS race fix: SC widget's skip() pauses + reloads internally.
            // The play() right after often arrives before the new track is ready
            // and is silently dropped by the widget. Verify and retry.
            setTimeout(() => {
                if (currentIndex !== index || !_userIntentPlay) return;
                widget.isPaused(p => { if (p) widget.play(); });
            }, 400);
        }

        function activateSilentAudio() {
            if (!silentAudio) return;
            silentAudio.play().then(() => {
                silentAudioActivated = true;
            }).catch(err => {
                console.warn('Silent audio bridge failed:', err.name, err.message);
            });
        }

        // Parent-side end-of-track timer. Single source of truth for scheduled advance.
        // Reschedules on every call — handles both forward progression (refining timing
        // as remaining shrinks) and backwards seeks (extending fire time).
        function scheduleAdvanceTimer(remainingMs) {
            if (_scheduledAdvance) { clearTimeout(_scheduledAdvance); _scheduledAdvance = null; }
            if (!_userIntentPlay || remainingMs <= 0) return;
            _scheduledAdvance = setTimeout(() => {
                _scheduledAdvance = null;
                if (Date.now() - _lastAdvanceTime > 1500 && _userIntentPlay) {
                    playNextInOrder();
                }
            }, remainingMs + 250);
        }

        // Watchdog: if iOS pauses the silent bridge (audio interruption, OS throttle,
        // or widget transition between tracks), resume it as long as user intent is play.
        // This keeps parent JS alive between track end and next-track-load — without it,
        // iOS throttles JS during the gap and auto-advance fails when screen is off.
        if (silentAudio) {
            silentAudio.addEventListener('pause', () => {
                if (_userIntentPlay) {
                    silentAudio.play().catch(() => {});
                }
            });
        }

        function updatePlayingState(playing) {
            isPlaying = playing;
            nowPlayingBar.classList.toggle('playing', playing);
            syncAllPlayIcons(playing);
            // Silent audio mirrors USER INTENT, not widget state.
            // Widget pauses momentarily between tracks (FINISH → PAUSE → next loads).
            // Pausing silent audio in that gap throttles parent JS in iOS background,
            // breaking auto-advance and MediaSession. Only ensure it's running when
            // user wants to play; explicit pause path handles stopping it.
            if (silentAudio && _userIntentPlay && silentAudio.paused) {
                activateSilentAudio();
            }
        }

        function fetchCurrentTrackInfo() {
            const fetchIndex = currentIndex;
            widget.getCurrentSound(function(sound) {
                if (sound && fetchIndex >= 0) {
                    trackCache[fetchIndex] = trackCache[fetchIndex] || {};
                    const title = sound.title || `Track ${fetchIndex + 1}`;
                    trackCache[fetchIndex].title = title;
                    trackCache[fetchIndex].duration = sound.duration || trackCache[fetchIndex].duration || 0;
                    trackInfoDirty = true;
                    // Only update UI if this track is still current
                    if (fetchIndex === currentIndex) {
                        currentTrackNameEl.textContent = title;
                        miniTrackName.textContent = title;
                        if (fsOpen) fsTrackName.textContent = title;
                    }
                    scheduleRenderTracks(); renderQueue();
                }
            });
            widget.getDuration(function(d) {
                if (d && d > 0) {
                    if (fetchIndex === currentIndex) duration = d;
                    if (fetchIndex >= 0) {
                        trackCache[fetchIndex] = trackCache[fetchIndex] || {};
                        trackCache[fetchIndex].duration = d;
                    }
                }
            });
        }

        function updateCurrentTrack(index) {
            currentIndex = index;
            playOrderIndex = playOrder.indexOf(index);
            const title = getTrackTitle(index);
            currentTrackNameEl.textContent = title;
            miniTrackName.textContent = title;
            duration = getTrackDuration(index);
            if (fsOpen) syncFullscreenState();
            fetchCurrentTrackInfo();
            scheduleRenderTracks();
            if (fsOpen) renderTrackBrowser();
            // Scroll active track into view if off-screen (skip when fullscreen is open)
            if (!fsOpen) {
                const activeWrapper = trackListEl.querySelector(`.track-item-wrapper[data-index="${index}"]`);
                if (activeWrapper) {
                    const rect = activeWrapper.getBoundingClientRect();
                    const viewH = window.innerHeight;
                    if (rect.top < 0 || rect.bottom > viewH - 80) {
                        activeWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }
        }

        // ========== FULLSCREEN PLAYER ==========
        function syncFullscreenState() {
            fsTrackName.textContent = getTrackTitle(currentIndex);
            syncAllPlayIcons(isPlaying);
            fsShuffleBtn.classList.toggle('shuffle-active', isShuffled);
            fsTimeTotal.textContent = formatTime(duration);
            widget.getPosition(function(pos) {
                if (duration > 0) {
                    fsProgressFill.style.width = ((pos / duration) * 100) + '%';
                    fsTimeNow.textContent = formatTime(pos);
                }
            });
        }

        function openFullscreen() {
            fsOpen = true;
            fullscreenPlayer.classList.add('open');
            document.body.classList.add('fs-open');
            miniPlayer.classList.remove('visible');
            if (!history.state?.fsOpen) {
                history.pushState({ fsOpen: true }, '', '');
            }
            syncFullscreenState();
            renderTrackBrowser();
        }

        function closeFullscreen() {
            if (!fsOpen) return;
            fsOpen = false;
            fullscreenPlayer.classList.remove('open');
            fullscreenPlayer.style.transform = '';
            document.body.classList.remove('fs-open');
            if (history.state?.fsOpen) history.back();
            checkMiniPlayer();
        }

        expandBtn.addEventListener('click', openFullscreen);
        fsCloseBtn.addEventListener('click', closeFullscreen);

        fsPlayBtn.addEventListener('click', toggleOrStart);
        fsPrevBtn.addEventListener('click', () => { _userIntentPlay = true; ensureSilentAudioOnGesture(); playPrevInOrder(); });
        fsNextBtn.addEventListener('click', () => { _userIntentPlay = true; ensureSilentAudioOnGesture(); playNextInOrder(); });
        fsShuffleBtn.addEventListener('click', () => {
            isShuffled = !isShuffled;
            fsShuffleBtn.classList.toggle('shuffle-active', isShuffled);
            generatePlayOrder();
            browserShuffledIndices = null;
            renderTrackBrowser();
        });

        // Fullscreen swipe-down to close (optimized)
        const SWIPE_RESISTANCE_START = 20;
        const SWIPE_RESISTANCE_FACTOR = 0.3;
        const SWIPE_CLOSE_DISTANCE = 60;
        const SWIPE_CLOSE_VELOCITY = 0.25;
        let fsTouchStartY = 0, fsTouchStartTime = 0, fsDragging = false;
        let fsTouchScrollableEl = null;
        const PROGRESS_BAR_GUARD = 30;

        function isInProgressZone(y) {
            const bar = fsProgressBar.getBoundingClientRect();
            return y >= bar.top - PROGRESS_BAR_GUARD && y <= bar.bottom + PROGRESS_BAR_GUARD;
        }

        function findScrollableParent(target) {
            const selectors = ['.fs-queue', '.track-browser-list', '.fs-content'];
            for (const sel of selectors) {
                const el = target.closest(sel);
                if (el && el.scrollHeight > el.clientHeight) return el;
            }
            return null;
        }

        fullscreenPlayer.addEventListener('touchstart', (e) => {
            if (isInProgressZone(e.touches[0].clientY)) return;
            fsTouchStartY = e.touches[0].clientY;
            fsTouchStartTime = Date.now();
            fsDragging = false;
            fsTouchScrollableEl = findScrollableParent(e.target);
            fullscreenPlayer.classList.remove('spring-back', 'dimming');
            fullscreenPlayer.style.transition = '';
            fullscreenPlayer.style.transform = '';
            fullscreenPlayer.style.background = 'var(--bg)';
        }, { passive: true });

        fullscreenPlayer.addEventListener('touchmove', (e) => {
            if (fsDragging === 'canceled') return;

            // Don't start drag if inside a scrollable child that hasn't reached the top
            if (fsTouchScrollableEl && !fsDragging) {
                if (fsTouchScrollableEl.scrollTop > 1) {
                    fsDragging = 'canceled';
                    return;
                }
            }

            const deltaY = e.touches[0].clientY - fsTouchStartY;

            if (deltaY <= 0) {
                if (fsDragging) {
                    fsDragging = 'canceled';
                    fullscreenPlayer.style.transform = '';
                    fullscreenPlayer.style.background = 'var(--bg)';
                }
                return;
            }

            if (!fsDragging) {
                if (isInProgressZone(e.touches[0].clientY)) return;
                fsDragging = true;
                fullscreenPlayer.classList.add('dimming');
            }

            e.preventDefault();
            fullscreenPlayer.classList.remove('spring-back');

            let adjustedDeltaY;
            if (deltaY < SWIPE_RESISTANCE_START) {
                adjustedDeltaY = deltaY * SWIPE_RESISTANCE_FACTOR;
            } else {
                const resisted = SWIPE_RESISTANCE_START * SWIPE_RESISTANCE_FACTOR;
                adjustedDeltaY = resisted + (deltaY - SWIPE_RESISTANCE_START);
            }

            const progress = Math.min(deltaY / 200, 1);
            const scale = 1 - (progress * 0.03);
            const dimOpacity = progress * 0.5;

            fullscreenPlayer.style.transform = `translateY(${adjustedDeltaY}px) scale(${scale})`;
            fullscreenPlayer.style.background = `rgba(10, 10, 11, ${1 - dimOpacity})`;
        }, { passive: false });

        fullscreenPlayer.addEventListener('touchend', (e) => {
            if (fsDragging === 'canceled' || !fsDragging) {
                fsDragging = false;
                return;
            }

            const deltaY = e.changedTouches[0].clientY - fsTouchStartY;
            const deltaTime = Date.now() - fsTouchStartTime;
            const velocity = deltaY / deltaTime;

            fullscreenPlayer.classList.add('spring-back');
            fullscreenPlayer.classList.remove('dimming');
            fullscreenPlayer.style.background = 'var(--bg)';

            const shouldClose = deltaY > SWIPE_CLOSE_DISTANCE ||
                (velocity > SWIPE_CLOSE_VELOCITY && deltaY > SWIPE_RESISTANCE_START);

            if (shouldClose) {
                if ('vibrate' in navigator) navigator.vibrate(5);
                fullscreenPlayer.style.transform = '';
                closeFullscreen();
            } else {
                fullscreenPlayer.style.transform = '';
            }

            fsDragging = false;
        }, { passive: true });

        fullscreenPlayer.addEventListener('touchcancel', () => {
            if (fsDragging) {
                fullscreenPlayer.classList.add('spring-back');
                fullscreenPlayer.style.transform = '';
                fullscreenPlayer.style.background = 'var(--bg)';
                fsDragging = false;
            }
        });

        window.addEventListener('popstate', () => { if (fsOpen) closeFullscreen(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && fsOpen) closeFullscreen(); });

        // Swipe-up to open fullscreen
        function addSwipeUpToOpen(el) {
            let startX = 0, startY = 0;
            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });
            el.addEventListener('touchend', (e) => {
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                if (dy < -50 && Math.abs(dy) > Math.abs(dx) * 1.5 && !fsOpen) openFullscreen();
            }, { passive: true });
        }
        addSwipeUpToOpen(nowPlayingBar);
        addSwipeUpToOpen(miniPlayer);

        // ========== SEEK HANDLER FACTORY ==========
        function createSeekHandler(barEl, fillEl, useWidth) {
            let seeking = false, lastPercent = 0;
            let touchStartX = 0, touchStartTime = 0, dragged = false;
            function getPercent(e) {
                const rect = barEl.getBoundingClientRect();
                const t = (e.touches && e.touches.length > 0) ? e.touches[0]
                        : (e.changedTouches && e.changedTouches.length > 0) ? e.changedTouches[0]
                        : e;
                return Math.max(0, Math.min(1, (t.clientX - rect.left) / rect.width));
            }
            function updateFill(p) {
                if (useWidth) fillEl.style.width = (p * 100) + '%';
                else fillEl.style.transform = 'scaleX(' + p + ')';
            }
            function startSeekVisual() {
                if (seeking) return;
                seeking = true;
                document.body.classList.add('seeking');
                if (barEl === fsProgressBar) fullscreenPlayer.classList.add('seeking');
            }
            function commitSeek() {
                if (duration > 0) widget.seekTo(lastPercent * duration);
                if (barEl === fsProgressBar) fsTimeNow.textContent = formatTime(lastPercent * duration);
                syncAllProgressBars(lastPercent * 100);
            }
            function cleanupTouch() {
                seeking = false; dragged = false;
                document.body.classList.remove('seeking');
                if (barEl === fsProgressBar) fullscreenPlayer.classList.remove('seeking');
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('touchend', endTouch);
                document.removeEventListener('mouseup', endMouse);
                document.removeEventListener('touchcancel', cancelSeek);
            }
            function onTouchMove(e) {
                const t = e.touches[0];
                if (!dragged && Math.abs(t.clientX - touchStartX) > 3) {
                    dragged = true;
                    startSeekVisual();
                }
                if (dragged) { lastPercent = getPercent(e); updateFill(lastPercent); }
            }
            function onMouseMove(e) { lastPercent = getPercent(e); updateFill(lastPercent); }
            function endTouch(e) {
                if (dragged) {
                    commitSeek();
                } else if (Date.now() - touchStartTime > 150) {
                    lastPercent = getPercent(e);
                    updateFill(lastPercent);
                    commitSeek();
                }
                cleanupTouch();
            }
            function endMouse() {
                commitSeek();
                seeking = false; document.body.classList.remove('seeking');
                if (barEl === fsProgressBar) fullscreenPlayer.classList.remove('seeking');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', endMouse);
            }
            function cancelSeek() { cleanupTouch(); }
            barEl.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartTime = Date.now();
                lastPercent = getPercent(e);
                dragged = false;
                document.addEventListener('touchmove', onTouchMove, { passive: false });
                document.addEventListener('touchend', endTouch);
                document.addEventListener('touchcancel', cancelSeek);
            }, { passive: true });
            barEl.addEventListener('mousedown', (e) => {
                startSeekVisual();
                lastPercent = getPercent(e); updateFill(lastPercent);
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', endMouse);
            });
        }

        createSeekHandler(barProgressContainer, progressFill, false);
        createSeekHandler(fsProgressBar, fsProgressFill, true);

        // ========== MINI PLAYER ==========
        const miniObserver = new IntersectionObserver((entries) => {
            const shouldShow = !entries[0].isIntersecting && currentIndex >= 0 && !fsOpen;
            miniPlayer.classList.toggle('visible', shouldShow);
        }, { threshold: 0 });
        miniObserver.observe(nowPlayingBar);

        function checkMiniPlayer() {
            if (fsOpen) { miniPlayer.classList.remove('visible'); return; }
            const rect = nowPlayingBar.getBoundingClientRect();
            miniPlayer.classList.toggle('visible', rect.bottom < 0 && currentIndex >= 0);
        }

        miniPlayBtn.addEventListener('click', toggleOrStart);
        miniExpand.addEventListener('click', openFullscreen);
        miniInfo.addEventListener('click', openFullscreen);

        // ========== COMPACT BAR CONTROLS ==========
        // Restart silent audio on every user gesture if currently paused. This is a no-op
        // when already playing, but recovers from iOS audio session interruptions.
        function ensureSilentAudioOnGesture() {
            if (silentAudio && silentAudio.paused) activateSilentAudio();
        }

        function toggleOrStart() {
            ensureSilentAudioOnGesture();
            if (currentIndex === -1) {
                if (playOrder.length > 0) playTrack(playOrder[0]);
                return;
            }
            // Explicit play/pause based on UI state — more deterministic than widget.toggle()
            // when the widget has stale state (post-FINISH, after audio interruption, etc.)
            if (isPlaying) {
                _userIntentPlay = false;
                if (_scheduledAdvance) { clearTimeout(_scheduledAdvance); _scheduledAdvance = null; }
                widget.pause();
                if (silentAudio) silentAudio.pause();
            } else {
                _userIntentPlay = true;
                widget.play();
            }
        }
        playBtn.addEventListener('click', toggleOrStart);
        prevBtn.addEventListener('click', () => { _userIntentPlay = true; ensureSilentAudioOnGesture(); playPrevInOrder(); });
        nextBtn.addEventListener('click', () => { _userIntentPlay = true; ensureSilentAudioOnGesture(); playNextInOrder(); });

        // ========== WIDGET EVENTS ==========
        widget.bind(SC.Widget.Events.READY, function() {
            widget.getSounds(function(sounds) {
                tracks = sounds;
                if (sounds.length > 0) {
                    trackCount = sounds.length;
                    generatePlayOrder(); // <-- Initialiseer de volgorde hier
                }
                renderTracks();
            });
            widget.bind(SC.Widget.Events.PLAY, function() {
                _skipPending = false;
                trackListEl.querySelectorAll('.track-item.loading').forEach(el => el.classList.remove('loading'));
                updatePlayingState(true); fetchCurrentTrackInfo();
                // Anchor advance timer on PLAY event — guarantees a fallback timer even if
                // PLAY_PROGRESS gets throttled or never fires in iOS background. Uses current
                // position, so resume-from-pause is correct. PLAY_PROGRESS will refine timing.
                if (duration > 0 && _userIntentPlay) {
                    widget.getPosition(function(pos) {
                        scheduleAdvanceTimer(duration - (pos || 0));
                    });
                }
            });
            widget.bind(SC.Widget.Events.PAUSE, function() { updatePlayingState(false); });
            widget.bind(SC.Widget.Events.PLAY_PROGRESS, function(e) {
                if (duration > 0) {
                    const percent = (e.currentPosition / duration) * 100;
                    syncAllProgressBars(percent);
                    if (fsOpen) { fsTimeNow.textContent = formatTime(e.currentPosition); fsTimeTotal.textContent = formatTime(duration); }
                    // Always reschedule (even on backwards seek) — old timer would fire too early.
                    scheduleAdvanceTimer(duration - e.currentPosition);
                }
            });
            widget.bind(SC.Widget.Events.FINISH, function() {
                if (_scheduledAdvance) { clearTimeout(_scheduledAdvance); _scheduledAdvance = null; }
                // Dedupe: if we just manually advanced (via parent timer or user action), ignore.
                if (Date.now() - _lastAdvanceTime < 1500) return;
                // Always advance from parent (more reliable than widget's built-in auto-advance
                // in iOS background, where postMessage events to iframe may be dropped).
                if (_userIntentPlay) playNextInOrder();
            });
            widget.getCurrentSoundIndex(function(index) { if (index >= 0) updateCurrentTrack(index); });
            setInterval(() => {
                if (!isPlaying || _skipPending) return;
                widget.getCurrentSoundIndex(function(index) { if (index !== currentIndex && index >= 0) updateCurrentTrack(index); });
            }, 500);
        });

        // ========== PAGE LIFECYCLE ==========
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState !== 'visible') return;
            // Resync all state with widget when returning to foreground
            widget.isPaused(function(paused) {
                if (paused === isPlaying) updatePlayingState(!paused);
            });
            widget.getCurrentSoundIndex(function(index) {
                if (index >= 0 && index !== currentIndex) updateCurrentTrack(index);
            });
            widget.getPosition(function(pos) {
                if (duration > 0) {
                    syncAllProgressBars((pos / duration) * 100);
                    if (fsOpen) fsTimeNow.textContent = formatTime(pos);
                }
            });
            widget.getDuration(function(d) {
                if (d && d > 0) duration = d;
            });
            // Re-activate silent audio bridge if it was interrupted while backgrounded
            if (silentAudio && silentAudio.paused && _userIntentPlay) activateSilentAudio();
            // Sync MediaSession with current state
            if (isPlaying) { updateMediaSession(); updatePositionState(); }
        });

        // Loading error timeout
        setTimeout(() => {
            if (!trackListInitialized) {
                trackListEl.innerHTML = '<div class="loading"><span style="color:var(--danger)">Could not load tracks. Check your connection and reload.</span></div>';
            }
        }, 10000);

        // First-time swipe hint
        if (!localStorage.getItem('swipeHintShown')) {
            setTimeout(() => {
                showToast('Swipe tracks right to queue');
                localStorage.setItem('swipeHintShown', '1');
            }, 2500);
        }

        // ========== MEDIA SESSION API ==========
        const DEFAULT_ARTWORK = 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><rect width="512" height="512" fill="#8B5CF6"/><path fill="white" d="M256 80c-97.2 0-176 78.8-176 176s78.8 176 176 176 176-78.8 176-176S353.2 80 256 80zm80 200h-64v80c0 26.5-21.5 48-48 48s-48-21.5-48-48 21.5-48 48-48c8.7 0 16.9 2.3 24 6.4V152h88v128z"/></svg>`);

        function updateMediaSession() {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.metadata = new MediaMetadata({
                title: getTrackTitle(currentIndex) || 'Unknown Track',
                artist: 'SoundCloud', album: 'Music Player',
                artwork: [{ src: DEFAULT_ARTWORK, sizes: '512x512', type: 'image/svg+xml' }]
            });
        }

        function updatePositionState() {
            if (!('mediaSession' in navigator) || !navigator.mediaSession.setPositionState || duration <= 0) return;
            widget.getPosition(function(p) {
                try { navigator.mediaSession.setPositionState({ duration: duration / 1000, playbackRate: 1, position: Math.min(p / 1000, duration / 1000) }); } catch (e) {}
            });
        }

        (function setupMediaSessionHandlers() {
            if (!('mediaSession' in navigator)) return;
            const h = [
                ['play', () => {
                    // Lockscreen play must always start playback — never toggle.
                    _userIntentPlay = true;
                    if (silentAudio && silentAudio.paused) activateSilentAudio();
                    if (currentIndex === -1) {
                        if (playOrder.length > 0) playTrack(playOrder[0]);
                    } else {
                        widget.play();
                    }
                    navigator.mediaSession.playbackState = 'playing';
                }],
                ['pause', () => {
                    _userIntentPlay = false;
                    if (_scheduledAdvance) { clearTimeout(_scheduledAdvance); _scheduledAdvance = null; }
                    widget.pause();
                    if (silentAudio) silentAudio.pause();
                    navigator.mediaSession.playbackState = 'paused';
                }],
                ['previoustrack', () => { _userIntentPlay = true; if (silentAudio && silentAudio.paused) activateSilentAudio(); playPrevInOrder(); }],
                ['nexttrack', () => { _userIntentPlay = true; if (silentAudio && silentAudio.paused) activateSilentAudio(); playNextInOrder(); }],
                // Explicitly null seek handlers: tells iOS we don't support seek-by-N-seconds,
                // so the lockscreen shows skip-track buttons instead of "skip 15s" buttons.
                ['seekbackward', null],
                ['seekforward', null],
                ['seekto', (d) => { if (d.seekTime !== undefined && duration > 0) { widget.seekTo(d.seekTime * 1000); updatePositionState(); } }],
                ['stop', () => {
                    _userIntentPlay = false;
                    if (_scheduledAdvance) { clearTimeout(_scheduledAdvance); _scheduledAdvance = null; }
                    widget.pause();
                    widget.seekTo(0);
                    if (silentAudio) silentAudio.pause();
                    navigator.mediaSession.playbackState = 'paused';
                }]
            ];
            for (const [a, fn] of h) { try { navigator.mediaSession.setActionHandler(a, fn); } catch (e) {} }
        })();

        // Hook Media Session into updates
        const _origUpdateCurrentTrack = updateCurrentTrack;
        updateCurrentTrack = function(index) {
            _origUpdateCurrentTrack(index);
            updateMediaSession(); updatePositionState();
        };
        const _origUpdatePlayingState = updatePlayingState;
        updatePlayingState = function(playing) {
            _origUpdatePlayingState(playing);
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
            if (fsOpen) syncFullscreenState();
        };

        setInterval(() => { if (isPlaying && duration > 0) updatePositionState(); }, 1000);

        // ========== PWA ICON + SERVICE WORKER ==========
        (function generateTouchIcon() {
            const c = document.createElement('canvas');
            c.width = 180; c.height = 180;
            const ctx = c.getContext('2d');
            // Purple rounded rect background
            ctx.fillStyle = '#8B5CF6';
            ctx.beginPath();
            ctx.roundRect(0, 0, 180, 180, 32);
            ctx.fill();
            // White music note
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(68, 130, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(84, 52, 8, 80);
            ctx.fillRect(84, 48, 40, 10);
            ctx.fillRect(116, 48, 8, 40);
            ctx.beginPath();
            ctx.arc(116, 88, 12, 0, Math.PI * 2);
            ctx.fill();
            // Set as apple-touch-icon
            const link = document.createElement('link');
            link.rel = 'apple-touch-icon';
            link.href = c.toDataURL('image/png');
            document.head.appendChild(link);
        })();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>

</html>
